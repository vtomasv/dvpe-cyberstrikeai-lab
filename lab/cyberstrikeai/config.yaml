# ============================================================================
# CyberStrikeAI — configuración para dvpe-cyberstrikeai-lab
# ----------------------------------------------------------------------------
# Adaptada para usar Ollama local (vía el contenedor `ollama-proxy`) y para
# registrar el catálogo completo de herramientas ofensivas que ya viene en
# el upstream (`tools/*.yaml`, `skills/*`, `agents/*`, `roles/*`).
# Documentación original: https://github.com/Ed1s0nZ/CyberStrikeAI
# ============================================================================

version: "lab-1.0"

server:
  host: 0.0.0.0
  port: 8080

auth:
  # Cambiar este valor antes de exponer el laboratorio fuera del host.
  password: "lab-cyberstrike"
  session_duration_hours: 12

log:
  level: info
  output: stdout

# ---------------------------------------------------------------------------
# Backend LLM: Ollama local expuesto como API compatible-OpenAI.
# Tambien soporta Gemini usando el endpoint OpenAI-compatible de Google:
#   provider: gemini
#   base_url: https://generativelanguage.googleapis.com/v1beta/openai
# Los valores reales se inyectan al inicio desde variables de entorno:
#   CSAI_OPENAI_PROVIDER / CSAI_OPENAI_BASE_URL / CSAI_OPENAI_API_KEY / CSAI_OPENAI_MODEL
# (ver entrypoint.sh). El bloque siguiente sirve como respaldo si
# alguien edita el archivo a mano.
# ---------------------------------------------------------------------------
openai:
  provider: openai
  base_url: http://ollama-proxy:11434/v1
  api_key: "ollama"
  model: "llama3.1:8b"
  max_total_tokens: 16384
  reasoning:
    # mode: off => ApplyToEinoChatModelConfig (internal/reasoning/eino.go) retorna
    # antes de inyectar 'thinking' / 'reasoning_effort' / 'output_config'. Esto
    # evita el error 400 "Unknown parameter: 'thinking'" en el nodo Eino
    # [node_1, ChatModel] cuando el LLM (Ollama/Gemini/OpenAI-compatible) no
    # soporta esos campos de razonamiento extendido (propios de Claude/DeepSeek).
    mode: off
    # effort: high => si en el futuro se reactiva el razonamiento (mode auto/on),
    # NUNCA enviar 'max' (rechazado por el endpoint: solo none/low/medium/high/xhigh).
    # Con mode: off este valor no se envia; queda fijado como red de seguridad.
    effort: high
    # allow_client_reasoning: false => el servidor IGNORA el campo `reasoning`
    # que el frontend pueda mandar en el cuerpo de la peticion. Sin esto, la UI
    # podria reactivar el razonamiento (mode=auto/on) y volver a disparar el
    # parametro 'thinking' aunque el config diga off. Para el laboratorio con
    # modelos locales conviene que mande SOLO lo definido aqui.
    allow_client_reasoning: false
    # profile openai_compat: nunca usar el perfil deepseek (que es el que agrega
    # 'thinking: {type: enabled}'). Aun con mode=off esto queda fijado por si en
    # el futuro se reactiva el razonamiento.
    profile: openai_compat

# ---------------------------------------------------------------------------
# Agente principal
# ---------------------------------------------------------------------------
agent:
  max_iterations: 200
  large_result_threshold: 102400
  result_storage_dir: tmp
  # nmap/gobuster/sqlmap pueden tardar varios minutos; subimos el techo.
  tool_timeout_minutes: 30

# Tools que no requieren aprobación humana (lectura/búsqueda).
# Las herramientas ofensivas (nmap, hydra, sqlmap, etc.) seguirán pidiendo
# confirmación antes de ejecutarse — lo que es lo deseable en un aula.
hitl:
  tool_whitelist: [read_file, list_dir, glob, grep, ping, dig, whois]

multi_agent:
  enabled: true
  robot_use_multi_agent: false
  batch_use_multi_agent: false
  max_iteration: 0
  sub_agent_max_iterations: 60
  without_general_sub_agent: false
  without_write_todos: false

# ---------------------------------------------------------------------------
# Persistencia: SQLite. El binario crea ambos ficheros si no existen.
# El volumen Docker `csai_data` (definido en docker-compose) monta /app/data
# para que el historial sobreviva al rebuild.
# ---------------------------------------------------------------------------
database:
  path: data/conversations.db
  knowledge_db_path: data/knowledge.db

# ---------------------------------------------------------------------------
# Herramientas de seguridad
# El binario lee `tools_dir` relativo al directorio del config en runtime
# (/app/config.runtime.yaml → /app/tools/). Allí están todos los .yaml que
# trae el upstream: nmap, masscan, gobuster, hydra, nikto, sqlmap, netexec,
# enum4linux-ng, rustscan, smbmap, nbtscan, dnsenum, wafw00f, etc.
# ---------------------------------------------------------------------------
security:
  tools_dir: tools
  tool_description_mode: full

# ---------------------------------------------------------------------------
# MCP: expuesto en :8081 dentro del contenedor (no publicado al host por
# defecto). Lo usamos para depurar tools desde el propio Attacker-PC.
# ---------------------------------------------------------------------------
mcp:
  enabled: true
  host: 0.0.0.0
  port: 8081
  auth_header: "X-MCP-Token"
  auth_header_value: ""

external_mcp:
  servers: {}

# C2 embebido (listeners HTTP/HTTPS/TCP). En el lab sólo lo usamos para
# demos de post-exploitation muy puntuales; el alumno puede dejarlo en
# false si no le interesa.
c2:
  enabled: true

# Knowledge base off por defecto — el embebido del upstream apunta a
# DashScope y requiere API key. Lo dejamos opcional.
knowledge:
  enabled: false
  base_path: knowledge_base

# ---------------------------------------------------------------------------
# Skills / Agents / Roles cargados desde los directorios que el upstream
# trae preparados (copiados a /app dentro de la imagen).
# ---------------------------------------------------------------------------
skills_dir: skills
agents_dir: agents
roles_dir: roles
