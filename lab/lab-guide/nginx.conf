server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — todas las rutas resuelven a index.html para que el
    # router del cliente pueda manejarlas.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets versionados generados por Vite.
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Healthcheck mínimo.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
