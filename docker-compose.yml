###############################################################################
# dvpe-cyberstrikeai-lab — Laboratorio de hacking ético
#
# Compose maestro que combina:
#   • DVPE (10 contenedores vulnerables + 6 redes)               — lab/dvpe/
#   • CyberStrikeAI (plataforma de pentesting con IA)            — lab/cyberstrikeai/
#   • ollama-proxy (puente TCP hacia Ollama en el host Docker)   — lab/ollama-proxy/
#   • lab-guide (guía web del alumno en Nginx)                   — lab/lab-guide/
#
# Uso típico:
#   make up        ó   docker compose up -d --build
#   make logs
#   make down
#
# Sólo network_a expone puertos al host. El resto de redes (b–f) queda aislado
# para forzar el pivoting tal como define el walkthrough original de DVPE.
###############################################################################

name: dvpe-cyberstrikeai-lab

services:
  # ===========================================================================
  # DVPE (10 contenedores) — Dockerfiles bajo lab/dvpe/configs/
  # ===========================================================================
  attacker_pc:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-Attacker-PC
    container_name: Attacker-PC
    hostname: Attacker-PC
    ports:
      - "2222:22"
      - "6080:6080"
    entrypoint: /bin/bash -c /root/start.sh
    networks:
      network_a:
        ipv4_address: 192.168.10.2
    devices:
      - "/dev/net/tun:/dev/net/tun"
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    restart: unless-stopped

  jerry_pc:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-Jerry-PC
    container_name: Jerry-PC
    hostname: Jerry-PC
    ports:
      - "2200:22"
      - "8000:8000"
    command: /bin/bash -c "/usr/sbin/sshd -D && /bin/bash"
    networks:
      network_a:
        ipv4_address: 192.168.10.3
      network_b:
        ipv4_address: 192.168.11.2
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  webserver:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-Webserver
    container_name: Webserver
    hostname: Webserver
    command: /bin/bash -c "service apache2 start && /usr/sbin/sshd -D && /bin/bash"
    networks:
      network_b:
        ipv4_address: 192.168.11.3
      network_c:
        ipv4_address: 192.168.12.2
      network_d:
        ipv4_address: 192.168.13.2
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  summer_pc:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-Summer-PC
    container_name: Summer-PC
    hostname: Summer-PC
    command: /bin/bash -c "/usr/sbin/sshd -D && /bin/bash"
    networks:
      network_c:
        ipv4_address: 192.168.12.3
    cap_add: [NET_ADMIN]
    restart: unless-stopped

  beth_pc:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-Beth-PC
    container_name: Beth-PC
    hostname: Beth-PC
    command: /bin/bash -c "/usr/sbin/sshd -D && /bin/bash"
    networks:
      network_c:
        ipv4_address: 192.168.12.4
    cap_add: [NET_ADMIN]
    restart: unless-stopped

  spacebeth_pc:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-SpaceBeth-PC
    container_name: SpaceBeth-PC
    hostname: SpaceBeth-PC
    command: /bin/bash -c "/usr/sbin/sshd -D && /bin/bash"
    networks:
      network_c:
        ipv4_address: 192.168.12.5
    cap_add: [NET_ADMIN]
    restart: unless-stopped

  server51:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-Server51
    container_name: Server51
    hostname: Server51
    ports:
      - "8081:80"   # liberamos 8080 para CyberStrikeAI
    entrypoint: /bin/bash -c /root/start.sh
    networks:
      network_d:
        ipv4_address: 192.168.13.3
      network_e:
        ipv4_address: 192.168.14.2
    cap_add: [NET_ADMIN]
    restart: unless-stopped

  birdperson_pc:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-Birdperson-PC
    container_name: Birdperson-PC
    hostname: Birdperson-PC
    command: /bin/bash -c "/usr/sbin/sshd -D && /bin/bash"
    networks:
      network_e:
        ipv4_address: 192.168.14.3
    cap_add: [NET_ADMIN]
    restart: unless-stopped

  morty_pc:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-Morty-PC
    container_name: Morty-PC
    hostname: Morty-PC
    command: /bin/bash -c "/usr/sbin/sshd -D && /bin/bash"
    networks:
      network_e:
        ipv4_address: 192.168.14.4
      network_f:
        ipv4_address: 192.168.100.2
    cap_add: [NET_ADMIN]
    restart: unless-stopped

  rick_pc:
    build:
      context: ./lab/dvpe/configs
      dockerfile: Dockerfile-Rick-PC
    container_name: Rick-PC
    hostname: Rick-PC
    command: /bin/bash -c "/usr/sbin/sshd -D && /bin/bash"
    networks:
      network_f:
        ipv4_address: 192.168.100.50
    cap_add: [NET_ADMIN]
    restart: unless-stopped

  # ===========================================================================
  # Servicios añadidos por el laboratorio (sólo en network_a)
  # ===========================================================================

  # Puente TCP hacia Ollama del host Docker. Mantener el endpoint estable
  # `http://ollama-proxy:11434` para CyberStrikeAI sin importar el SO del host.
  ollama-proxy:
    build:
      context: ./lab/ollama-proxy
    image: dvpe-lab/ollama-proxy:local
    container_name: ollama-proxy
    hostname: ollama-proxy
    environment:
      OLLAMA_HOST: "${OLLAMA_HOST:-host.docker.internal}"
      OLLAMA_PORT: "${OLLAMA_PORT:-11434}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      network_a:
        ipv4_address: 192.168.10.30
    restart: unless-stopped

  cyberstrikeai:
    build:
      context: ./lab/cyberstrikeai
      args:
        CYBERSTRIKEAI_REF: "${CYBERSTRIKEAI_REF:-v1.6.13}"
    image: dvpe-lab/cyberstrikeai:local
    container_name: CyberStrikeAI
    hostname: cyberstrikeai
    depends_on:
      - ollama-proxy
    environment:
      CSAI_OPENAI_PROVIDER:  "${CSAI_OPENAI_PROVIDER:-openai}"
      CSAI_OPENAI_BASE_URL: "${CSAI_OPENAI_BASE_URL:-http://ollama-proxy:11434/v1}"
      CSAI_OPENAI_API_KEY:  "${CSAI_OPENAI_API_KEY:-ollama}"
      CSAI_OPENAI_MODEL:    "${CSAI_OPENAI_MODEL:-llama3.1:8b}"
    volumes:
      - cyberstrikeai_data:/app/data
      - ./lab/cyberstrikeai/config.yaml:/app/config.yaml:ro
    ports:
      - "8090:8080"   # Web console
      - "8091:8081"   # MCP HTTP
    networks:
      network_a:
        ipv4_address: 192.168.10.10
    cap_add: [NET_ADMIN]
    restart: unless-stopped

  lab-guide:
    build:
      # El contexto es la raíz del repo porque el Dockerfile compila la SPA
      # (client/, server/, shared/, package.json, etc.) y luego la sirve con
      # Nginx. Mantener el código fuente fuera de lab/lab-guide/ evita duplicarlo.
      context: .
      dockerfile: lab/lab-guide/Dockerfile
    image: dvpe-lab/lab-guide:local
    container_name: Lab-Guide
    hostname: lab-guide
    ports:
      - "8088:80"
    networks:
      network_a:
        ipv4_address: 192.168.10.20
    restart: unless-stopped

###############################################################################
# Redes — replicamos exactamente la topología original de DVPE.
###############################################################################
networks:
  network_a:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.10.0/24
  network_b:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 192.168.11.0/24
  network_c:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 192.168.12.0/24
  network_d:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 192.168.13.0/24
  network_e:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 192.168.14.0/24
  network_f:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 192.168.100.0/24

volumes:
  cyberstrikeai_data:
